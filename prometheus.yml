global:
  scrape_interval: 30s # Cứ 30 giây đi hút dữ liệu 1 lần

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal là câu lệnh để Docker gọi ngược ra Spring Boot đang chạy trên máy thật
      - targets: ['host.docker.internal:8081']